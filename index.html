<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Darts Bingo 4×4</title>

  <style>
    :root{
      --bg:#f8fafc;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --border:#e2e8f0;
      --cell:#f1f5f9;
      --cellHover:#e8eef6;
      --selectedBg:#dcfce7;
      --selectedBorder:#22c55e;
      --btn:#0f172a;
      --btnText:#ffffff;
      --btnGhost:#ffffff;
      --btnGhostText:#0f172a;
      --shadow: 0 12px 28px rgba(2, 6, 23, .08);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 70%);
      color:var(--text);
      min-height:100vh;
      padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
      display:grid;
      place-items:center;
    }

    .wrap{
      width:min(480px, 100%);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
      box-shadow: var(--shadow);
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
    }

    h1{
      margin:0;
      font-size:15px;
      letter-spacing:.2px;
    }

    .controls{
      display:flex;
      gap:6px;
      align-items:center;
    }

    button{
      appearance:none;
      border:1px solid transparent;
      border-radius:12px;
      padding:8px 9px;
      font-weight:700;
      font-size:12.5px;
      line-height:1;
      cursor:pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary{
      background:var(--btn);
      color:var(--btnText);
    }

    .btn-ghost{
      background:var(--btnGhost);
      color:var(--btnGhostText);
      border-color: var(--border);
    }

    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      align-items:center;
      justify-content:space-between;
      margin: 6px 0 10px;
      color:var(--muted);
      font-size:11.5px;
    }

    .chip{
      border:1px solid var(--border);
      background:#fff;
      padding:3px 8px;
      border-radius:999px;
      white-space:nowrap;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:8px;
    }

    .cell{
      background: var(--cell);
      border: 1px solid var(--border);
      border-radius:14px;
      padding:10px 8px;
      min-height:72px;
      display:grid;
      place-items:center;
      text-align:center;
      font-weight:800;
      font-size:12.5px;
      line-height:1.1;
      user-select:none;
      cursor:pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s ease, border-color .15s ease, transform .06s ease;
    }

    .cell:active{
      transform: scale(.99);
      background: var(--cellHover);
    }

    .cell.selected{
      background: var(--selectedBg);
      border-color: var(--selectedBorder);
    }

    .hint{
      margin-top:8px;
      color: var(--muted);
      font-size:11.5px;
      line-height:1.25;
    }

    /* sehr kleine Smartphones */
    @media (max-width: 340px){
      .cell{
        min-height:68px;
        font-size:12px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>🎯 Darts Bingo 4×4</h1>
      <div class="controls">
        <button class="btn-ghost" id="btnReset">Reset</button>
        <button class="btn-primary" id="btnNew">Neu</button>
      </div>
    </header>

    <div class="meta">
      <span class="chip" id="seedChip">Seed: –</span>
      <span class="chip" id="countChip">Markiert: 0/16</span>
      <button class="btn-ghost" id="btnLink">Link</button>
    </div>

    <div class="grid" id="grid"></div>

    <div class="hint">
      Tipp: „Link“ kopiert eine URL mit Seed – beide Spieler haben dieselbe Karte.
    </div>
  </div>

  <script>
    const POOL = [
      "Back to Back 140",
      "Check über D17",
      "Shanghai",
      "Doppel Doppel",
      "High Finish",
      "Whitewash",
      "Maximum",
      "100% Check",
      "Check über Bull",
      "Madhouse Check",
      "134",
      "Finish nach 9",
      "Checkout Streak von 5",
      "Min. 85,00 Power Scoring Avg.",
      "Leg ohne Streudart",
      "Leggewinn nur über untere Darthälfte"
    ];

    function xmur3(str){
      let h = 1779033703 ^ str.length;
      for (let i=0;i<str.length;i++){
        h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
        h = (h << 13) | (h >>> 19);
      }
      return function(){
        h = Math.imul(h ^ (h >>> 16), 2246822507);
        h = Math.imul(h ^ (h >>> 13), 3266489909);
        return (h ^= (h >>> 16)) >>> 0;
      };
    }

    function mulberry32(a){
      return function(){
        let t = (a += 0x6D2B79F5);
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function rngFromSeed(seedStr){
      return mulberry32(xmur3(seedStr)());
    }

    function shuffle(arr, rand){
      for (let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(rand() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function sampleN(arr, n, rand){
      const copy = arr.slice();
      shuffle(copy, rand);
      return copy.slice(0, n);
    }

    const gridEl = document.getElementById("grid");
    const seedChip = document.getElementById("seedChip");
    const countChip = document.getElementById("countChip");
    const btnNew = document.getElementById("btnNew");
    const btnReset = document.getElementById("btnReset");
    const btnLink = document.getElementById("btnLink");

    function makeSeed(){
      return (Date.now().toString(36) + Math.random().toString(36).slice(2, 7)).toUpperCase();
    }

    function getSeed(){
      return new URLSearchParams(location.search).get("seed") || makeSeed();
    }

    function setSeed(seed){
      const url = new URL(location.href);
      url.searchParams.set("seed", seed);
      history.replaceState({}, "", url);
    }

    let seed = getSeed();
    let selected = new Set();

    function updateMeta(){
      seedChip.textContent = `Seed: ${seed}`;
      countChip.textContent = `Markiert: ${selected.size}/16`;
    }

    function render(){
      const rand = rngFromSeed(seed);
      const card = shuffle(sampleN(POOL, 16, rand), rand);

      gridEl.innerHTML = "";
      selected.clear();
      updateMeta();

      card.forEach((text, i) => {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.textContent = text;

        cell.onclick = () => {
          if (selected.has(i)){
            selected.delete(i);
            cell.classList.remove("selected");
          } else {
            selected.add(i);
            cell.classList.add("selected");
          }
          updateMeta();
        };

        gridEl.appendChild(cell);
      });
    }

    btnNew.onclick = () => {
      seed = makeSeed();
      setSeed(seed);
      render();
    };

    btnReset.onclick = () => {
      selected.clear();
      document.querySelectorAll(".cell").forEach(c => c.classList.remove("selected"));
      updateMeta();
    };

    btnLink.onclick = async () => {
      const url = location.href;
      try{
        await navigator.clipboard.writeText(url);
        btnLink.textContent = "✓";
        setTimeout(() => btnLink.textContent = "Link", 900);
      } catch {
        prompt("Link kopieren:", url);
      }
    };

    setSeed(seed);
    render();
  </script>
</body>
</html>
